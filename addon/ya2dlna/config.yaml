name: "Ya2DLNA Streaming"
version: "1.0.0"
slug: "ya2dlna"
description: "Stream audio from Yandex Station to DLNA device"
arch:
  - aarch64
  - amd64
startup: application
boot: auto
init: false
host_network: true
ports:
  8000/tcp: 8000
  8001/tcp: 8001
map:
  - config:rw
logo: "logo.png"
options:
  debug: false
schema:
  debug: bool

build_from:
  aarch64: ghcr.io/home-assistant/aarch64-base:latest
  amd64: ghcr.io/home-assistant/amd64-base:latest
