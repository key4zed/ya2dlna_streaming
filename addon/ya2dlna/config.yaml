name: "Ya2DLNA Streaming"
version: "1.0.9"
slug: "ya2dlna"
description: "Stream audio from Yandex Station to DLNA device"
arch:
  - aarch64
  - amd64
  - armhf
startup: application
boot: auto
host_network: true
ports:
  8000/tcp: 8000
  8001/tcp: 8001
map:
  - config:rw
logo: "logo.png"
options:
  ya_music_token: ""
  x_token: ""
  cookie: ""
  ruark_pin: ""
  local_server_host: "0.0.0.0"
  local_server_port_dlna: 8001
  local_server_port_api: 8000
  stream_quality: "192"
  debug: false
  mute_yandex_station: true
schema:
  ya_music_token: str
  x_token: str
  cookie: str
  ruark_pin: str
  local_server_host: str
  local_server_port_dlna: int
  local_server_port_api: int
  stream_quality: str
  debug: bool
  mute_yandex_station: bool

build_from:
  aarch64: ghcr.io/home-assistant/aarch64-base:latest
  amd64: ghcr.io/home-assistant/amd64-base:latest
  armhf: ghcr.io/home-assistant/armhf-base:latest
